syntax = "proto3";

package ocpp.gateway.v1;

// Bidi stream between an internal battery and the gateway.
// The battery sends DeviceEvent JSON strings, the gateway replies with
// DeviceCommand JSON strings. Using JSON-in-string keeps the proto stable
// while the adapter event/command schema evolves.
service BatteryBus {
  rpc Stream(stream EventEnvelope) returns (stream CommandEnvelope);
}

message EventEnvelope {
  string battery_id = 1;
  string event_json = 2;
}

message CommandEnvelope {
  string command_json = 1;
}
